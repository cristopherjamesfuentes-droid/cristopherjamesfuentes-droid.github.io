<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> tofer.0 img de prueba</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Contenedor estético para el póster */
        .poster-container {
            display: inline-block;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-width: 100%;
        }

        .poster-container img {
            max-width: 450px; /* Tamaño ideal para que no rompa la pantalla */
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Mi Rincón de C++, Juegos y Diseño</h1>

    <div class="poster-container">
        <img src="belive.jpg" alt="Gatito motivacional Believe">
    </div>

</body>
</html>
